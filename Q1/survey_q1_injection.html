<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Q1 初诊登记 · 殖装适应性体检</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00ffff;--magenta:#ff00ff;--yellow:#ffff00;--green:#00ff88;--red:#ff2244;--bg:#030810;--panel:rgba(6,14,30,0.96)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:#e0f0ff;font-family:'Noto Sans SC',sans-serif;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh}
#scanline{position:fixed;inset:0;pointer-events:none;z-index:9000;background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,.09) 2px,rgba(0,0,0,.09) 3px)}
.bg-glow{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.bg-glow::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,#00ffff,transparent);opacity:.04;top:-280px;left:-280px;filter:blur(80px)}
.bg-glow::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,#ff00ff,transparent);opacity:.04;bottom:-160px;right:-160px;filter:blur(80px)}
#app{position:relative;z-index:10;max-width:560px;width:100%;display:flex;flex-direction:column;padding:16px 16px 40px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{50%{opacity:0}}

/* INTRO */
.intro-overlay{position:fixed;inset:0;z-index:800;background:rgba(3,8,16,.93);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s forwards}
.intro-overlay.hidden{display:none}
.intro-modal{max-width:420px;width:100%;background:var(--panel);border:1px solid rgba(0,255,255,.22);box-shadow:0 0 60px rgba(0,255,255,.07),0 0 120px rgba(255,0,255,.04),inset 0 0 40px rgba(0,0,0,.4);padding:24px 22px 20px;position:relative;animation:slideUp .4s .1s both}
.intro-modal::before,.intro-modal::after,.intro-modal .bl,.intro-modal .br{content:'';position:absolute;width:16px;height:16px}
.intro-modal::before{top:0;left:0;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan)}
.intro-modal::after{top:0;right:0;border-top:2px solid var(--cyan);border-right:2px solid var(--cyan)}
.intro-modal .bl{bottom:0;left:0;border-bottom:2px solid var(--magenta);border-left:2px solid var(--magenta)}
.intro-modal .br{bottom:0;right:0;border-bottom:2px solid var(--magenta);border-right:2px solid var(--magenta)}
.intro-speaker{font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(232,121,249,.8);letter-spacing:.15em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.intro-speaker::before{content:'';width:6px;height:6px;background:var(--magenta);border-radius:50%;box-shadow:0 0 8px var(--magenta);animation:blink .8s step-end infinite}
.intro-bubble{font-size:13.5px;line-height:1.85;color:rgba(224,240,255,.9);margin-bottom:22px;border-left:2px solid rgba(0,255,255,.2);padding-left:12px}
.intro-bubble em{color:var(--cyan);font-style:normal}
.intro-btn{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--cyan);border:1px solid rgba(0,255,255,.5);padding:12px 28px;background:rgba(0,255,255,.08);cursor:pointer;display:block;margin:0 auto;transition:background .2s,box-shadow .2s;letter-spacing:.05em}
.intro-btn:hover{background:rgba(0,255,255,.18);box-shadow:0 0 20px rgba(0,255,255,.25)}

/* MAIN */
.q1-main{display:none;flex-direction:column;gap:14px}
.q1-main.visible{display:flex;animation:slideUp .4s forwards}

/* PROGRESS */
.q-progress{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.q-progress-label{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--cyan);letter-spacing:.12em;text-shadow:0 0 10px rgba(0,255,255,.5);flex-shrink:0}
.q-progress-track{flex:1;height:8px;background:rgba(0,255,255,.08);border:1px solid rgba(255,255,255,.25);border-radius:2px;overflow:hidden}
.q-progress-fill{height:100%;border-radius:1px;background:linear-gradient(90deg,var(--cyan),var(--magenta),var(--yellow));box-shadow:0 0 12px rgba(0,255,255,.4);transition:width .4s ease}
.q-progress-num{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--magenta);letter-spacing:.08em;text-shadow:0 0 10px rgba(255,0,255,.5);flex-shrink:0}

/* HEADER */
.q-header{display:flex;flex-direction:column;gap:10px;align-items:center;text-align:center}
.q-tag{font-family:'Press Start 2P',monospace;font-size:clamp(9px,2.2vw,11px);letter-spacing:.1em;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.q-tag-num{color:var(--cyan);text-shadow:0 0 8px rgba(0,255,255,.4)}
.q-tag-sep{color:var(--cyan);opacity:.9}
.q-tag-cat{color:var(--magenta);text-shadow:0 0 8px rgba(255,0,255,.4);font-size:0.95em}
.q-text{font-size:clamp(18px,4.5vw,22px);font-weight:600;color:rgba(0,255,255,.98);line-height:1.5;text-shadow:0 0 20px rgba(0,255,255,.5),0 0 40px rgba(0,255,255,.2),0 0 60px rgba(0,255,255,.08);font-family:'Noto Sans SC',sans-serif;letter-spacing:.06em;max-width:100%}
.q-hint{font-size:14px;font-weight:500;color:rgba(255,255,0,.95);font-family:'Noto Sans SC',sans-serif;text-shadow:0 0 12px rgba(255,255,0,.5);letter-spacing:.04em}

/* SYRINGE STAGE */
.syringe-stage{background:rgba(4,10,22,.7);border:1px solid rgba(255,255,255,.05);padding:20px 12px 24px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:16px}
.syringe-stage::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.03) 1px,transparent 1px);background-size:10px 10px;pointer-events:none}

/* VEIN TARGETS */
.vein-row{display:flex;gap:12px;justify-content:center}
.vein-cell{flex:1;max-width:240px;display:flex;flex-direction:column;gap:0;padding:12px 12px 10px;background:rgba(6,14,30,.9);border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:border-color .35s,box-shadow .35s,background .35s;position:relative;-webkit-tap-highlight-color:transparent;user-select:none}
.vein-cell::before,.vein-cell::after{content:'';position:absolute;width:10px;height:10px;opacity:.3;transition:opacity .3s}
.vein-cell::before{top:0;left:0;border-top:1px solid var(--cell-color,rgba(255,255,255,.2));border-left:1px solid var(--cell-color,rgba(255,255,255,.2))}
.vein-cell::after{bottom:0;right:0;border-bottom:1px solid var(--cell-color,rgba(255,255,255,.2));border-right:1px solid var(--cell-color,rgba(255,255,255,.2))}
.vein-cell:hover{border-color:rgba(255,255,255,.18);background:rgba(6,18,38,.9)}
.vein-cell.selected{border-color:var(--cell-color);box-shadow:0 0 24px var(--cell-glow);background:rgba(6,18,38,.95)}
.vein-cell.selected::before,.vein-cell.selected::after{opacity:1}
/* card header row: [A] 初诊 */
.vein-header{display:flex;align-items:baseline;gap:8px;margin-bottom:6px}
.vein-key{font-family:'Press Start 2P',monospace;font-size:10px;color:rgba(255,255,255,.22);transition:color .3s,text-shadow .3s;flex-shrink:0}
.vein-cell.selected .vein-key{color:var(--cell-color);text-shadow:0 0 10px var(--cell-color)}
.vein-title{font-size:15px;font-weight:600;color:rgba(224,240,255,.55);font-family:'Noto Sans SC',sans-serif;transition:color .3s;letter-spacing:.04em}
.vein-cell.selected .vein-title{color:rgba(224,240,255,.95)}
/* quote line */
.vein-quote{font-size:12px;color:rgba(224,240,255,.38);font-family:'Noto Sans SC',sans-serif;line-height:1.6;letter-spacing:.03em;margin-bottom:8px;transition:color .3s;word-break:keep-all}
.vein-cell.selected .vein-quote{color:rgba(224,240,255,.75)}
/* divider */
.vein-divider{width:100%;height:1px;background:linear-gradient(90deg,var(--cell-color,rgba(255,255,255,.1)),transparent);opacity:.25;margin-bottom:7px;transition:opacity .3s}
.vein-cell.selected .vein-divider{opacity:.6}
/* case footer row */
.vein-footer{display:flex;align-items:center;justify-content:space-between;gap:6px}
.vein-case{font-family:'Press Start 2P',monospace;font-size:6px;color:rgba(255,255,255,.15);letter-spacing:.08em;transition:color .3s;line-height:1.4}
.vein-cell.selected .vein-case{color:var(--cell-color);opacity:.7}
/* vein bar (inside footer) */
.vein-bar-wrap{width:52px;flex-shrink:0;height:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:1px;position:relative;overflow:hidden}
.vein-bar-fill{height:100%;width:0%;border-radius:1px;position:absolute;left:0;top:0;transition:width .6s cubic-bezier(.4,0,.2,1)}
.vein-cell.selected .vein-bar-fill{background:var(--cell-color);box-shadow:0 0 6px var(--cell-color)}
@keyframes veinPulse{0%,100%{box-shadow:inset 0 0 0 1px transparent}50%{box-shadow:inset 0 0 0 1px var(--cell-color,rgba(255,255,255,.2))}}
.vein-cell.selected .vein-bar-wrap{animation:veinPulse 1.4s ease-in-out infinite}

/* SYRINGE */
.syringe-container{display:flex;flex-direction:column;align-items:center;gap:10px;position:relative;padding:4px 0}
.syringe-wrap{width:100%;display:flex;align-items:center;justify-content:center;height:60px;position:relative}
.syringe-svg-wrap{transition:transform .45s cubic-bezier(.4,0,.2,1);will-change:transform;transform-origin:center center}
.syringe-hint{font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(255,255,255,.18);letter-spacing:.1em;text-align:center}

/* NPC COMMENT */
.npc-comment{background:var(--panel);border:1px solid rgba(0,255,255,.1);border-left:2px solid rgba(0,255,255,.3);padding:10px 14px 10px 12px;font-size:13px;color:rgba(224,240,255,.72);line-height:1.75;min-height:48px;transition:opacity .22s;position:relative}
.npc-comment::before{content:'春姬 · Niuma';font-family:'Press Start 2P',monospace;font-size:6px;color:rgba(232,121,249,.65);letter-spacing:.1em;display:block;margin-bottom:6px}
.npc-comment.fade{opacity:0}
.npc-comment em{color:var(--cyan);font-style:normal}

/* CONFIRM */
.confirm-zone{opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;transform:translateY(8px);display:flex;flex-direction:column;align-items:center;gap:12px;padding:4px 0}
.confirm-zone.visible{opacity:1;pointer-events:all;transform:translateY(0)}
.confirm-selected-text{font-family:monospace;font-size:12px;color:rgba(255,255,255,.5);text-align:center}
.confirm-hint{font-family:'Press Start 2P',monospace;font-size:6px;color:rgba(255,255,255,.2);letter-spacing:.06em;text-align:center}
.confirm-btn{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--cyan);border:1px solid rgba(0,255,255,.5);padding:13px 32px;background:rgba(0,255,255,.07);cursor:pointer;transition:background .2s,box-shadow .2s;letter-spacing:.06em}
.confirm-btn:hover{background:rgba(0,255,255,.18);box-shadow:0 0 24px rgba(0,255,255,.2)}

/* TRANSITION SCREEN */
#transition-screen{position:fixed;inset:0;z-index:3200;background:rgba(3,8,16,.97);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#transition-screen.open{display:flex;animation:fadeIn .4s forwards}
.ts-eva{font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(232,121,249,.7);letter-spacing:.1em;display:flex;align-items:center;gap:8px}
.ts-eva::before{content:'';width:5px;height:5px;background:var(--magenta);border-radius:50%;box-shadow:0 0 6px var(--magenta);animation:blink .7s step-end infinite}
.ts-line{font-family:'Noto Sans SC',sans-serif;font-size:15px;color:rgba(224,240,255,.85);letter-spacing:.06em;text-align:center;line-height:1.9}
.ts-line em{color:var(--cyan);font-style:normal}
.ts-dots{display:flex;gap:8px;margin-top:4px}
.ts-dot{width:5px;height:5px;border-radius:50%;background:rgba(0,255,255,.2);animation:tsDot 1.2s ease-in-out infinite}
.ts-dot:nth-child(2){animation-delay:.2s}
.ts-dot:nth-child(3){animation-delay:.4s}
@keyframes tsDot{0%,100%{background:rgba(0,255,255,.2);transform:scale(1)}50%{background:var(--cyan);transform:scale(1.4);box-shadow:0 0 8px var(--cyan)}}

/* EGG 1 LIGHTS OUT */
#lights-out{position:fixed;inset:0;z-index:5000;pointer-events:none;display:block}
#lights-out.on{pointer-events:all}
#lights-out-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;opacity:0;transition:opacity .5s ease;z-index:1}
#lights-out.on #lights-out-content{opacity:1}
#lights-out-dim{position:absolute;inset:0;background:#000;opacity:0;transition:opacity .6s ease;z-index:2}
#lights-out.on #lights-out-dim{opacity:0}
.lo-eva{font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(232,121,249,.7);letter-spacing:.1em;display:flex;align-items:center;gap:8px}
.lo-eva::before{content:'';width:5px;height:5px;background:var(--magenta);border-radius:50%;box-shadow:0 0 6px var(--magenta);animation:blink .7s step-end infinite}
.lo-text{font-family:'Press Start 2P',monospace;font-size:clamp(10px,3.5vw,15px);color:#fff;text-align:center;line-height:2.4;letter-spacing:.04em;animation:glitch 3s step-end infinite}
.lo-sub{font-family:'Press Start 2P',monospace;font-size:6px;color:rgba(255,34,68,.6);letter-spacing:.14em;animation:blink .65s step-end infinite}
@keyframes glitch{0%,88%,100%{text-shadow:2px 0 #ff2244,-2px 0 #00ffff;transform:none}90%{text-shadow:-4px 0 #ff2244,4px 0 #00ffff;transform:translateX(3px)}93%{text-shadow:4px 0 #ff2244,-4px 0 #00ffff;transform:translateX(-3px)}96%{text-shadow:2px 0 #ff2244,-2px 0 #00ffff;transform:none}}

</style>
</head>
<body>
<audio id="q1-bgm" loop preload="auto"><source src="贯穿所有的bgm.mp3" type="audio/mpeg"></audio>
<div id="scanline"></div>
<div class="bg-glow"></div>

<!-- INTRO -->
<div class="intro-overlay" id="introOverlay">
  <div class="intro-modal">
    <div class="bl"></div><div class="br"></div>
    <div class="intro-speaker">春姬 · Niuma</div>
    <div class="intro-bubble">
      欢迎来到<em>殖装适应性体检中心</em>——<br><br>
      今天要往你体内打点东西。放心，不疼的……<em>大概</em>。<br><br>
      在开始之前，先配合我填一份<em>初诊登记表</em>。
    </div>
    <button class="intro-btn" id="introBtn">开始登记</button>
  </div>
</div>

<!-- MAIN -->
<div id="app">
  <div class="q1-main" id="q1Main">
    <div class="q-progress">
      <span class="q-progress-label">PROGRESS</span>
      <div class="q-progress-track">
        <div class="q-progress-fill" id="q1ProgressFill" style="width:40%"></div>
      </div>
      <span class="q-progress-num" id="q1ProgressNum">2/5</span>
    </div>
    <div class="q-header">
      <div class="q-tag">
        <span class="q-tag-num">QUESTION_01</span>
        <span class="q-tag-sep">//</span>
        <span class="q-tag-cat">初诊登记</span>
      </div>
      <div class="q-text">请问你本次是第几次参加测试呢？</div>
      <div class="q-hint">▷ 点击选项 · 瞄准注射</div>
    </div>

    <!-- SYRINGE INTERACTION -->
    <div class="syringe-stage" id="syringeStage">
      <!-- Option panels (vein targets) -->
      <div class="vein-row" id="veinRow"></div>

      <!-- NPC comment -->
      <div class="npc-comment" id="npcComment">选择你的情况，瞄准对应血管后注射确认。</div>

      <!-- Syringe -->
      <div class="syringe-container">
        <div class="syringe-wrap">
          <div class="syringe-svg-wrap" id="syringeSvgWrap"></div>
        </div>
        <div class="syringe-hint">TAP OPTION TO AIM · INJECT TO CONFIRM</div>
      </div>
    </div>

    <div class="confirm-zone" id="confirmZone">
      <div class="confirm-selected-text" id="confirmText"></div>
      <div class="confirm-hint" id="confirmHint"></div>
      <button class="confirm-btn" id="confirmBtn">注射确认</button>
    </div>
  </div>
</div>

<!-- TRANSITION -->
<div id="transition-screen">
  <div class="ts-eva">春姬 · Niuma</div>
  <div class="ts-line">样本注入成功<br>正在<em>核对初始档案</em></div>
  <div class="ts-dots"><div class="ts-dot"></div><div class="ts-dot"></div><div class="ts-dot"></div></div>
</div>

<!-- EGG 1 -->
<div id="lights-out">
  <div id="lights-out-content">
    <div class="lo-eva">春姬 · Niuma</div>
    <div class="lo-text">老病人了嗦<br>灯关掉吧</div>
    <div class="lo-sub">⚠ 光源异常 · 正在恢复...</div>
  </div>
  <div id="lights-out-dim"></div>
</div>


<script>
(function(){

const OPTIONS=[
  {key:'A',title:'初诊',quote:'「有点紧张你别乱动」',caseNum:'CASE #0001',caseTag:'NEW',label:'A · 初诊',color:'#00ffff',glow:'rgba(0,255,255,.32)'},
  {key:'B',title:'复诊',quote:'「脾气很大你忍一下」',caseNum:'CASE #????',caseTag:'RETURNING',label:'B · 复诊',color:'#ff00ff',glow:'rgba(255,0,255,.3)'},
];

const NPC_IDLE='选择你的情况，瞄准对应血管后注射确认。';
const NPC_COMMENTS={
  A:'<em>初次接入</em>……放轻松，我手很稳的。',
  B:'复诊用户——哦，<em>老熟人</em>了。脾气大没关系，针扎下去就好了。',
};

// ─── AUDIO ───────────────────────────────────────
function playClick(){try{var c=new(window.AudioContext||window.webkitAudioContext)(),n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(880,n);g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(.38,n+.02);g.gain.linearRampToValueAtTime(0,n+.06);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+.07);}catch(e){}}
function playChime(){try{var c=new(window.AudioContext||window.webkitAudioContext)(),n=c.currentTime;[880,1100,1320].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,n+i*.1);g.gain.linearRampToValueAtTime(.3,n+i*.1+.02);g.gain.linearRampToValueAtTime(0,n+i*.1+.2);o.connect(g);g.connect(c.destination);o.start(n+i*.1);o.stop(n+i*.1+.25);});}catch(e){}}
function playInject(){try{var c=new(window.AudioContext||window.webkitAudioContext)(),n=c.currentTime;var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(1400,n);o.frequency.exponentialRampToValueAtTime(500,n+.18);g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(.3,n+.02);g.gain.linearRampToValueAtTime(0,n+.2);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+.22);var o2=c.createOscillator(),g2=c.createGain();o2.type='sawtooth';o2.frequency.setValueAtTime(90,n+.04);g2.gain.setValueAtTime(.12,n+.04);g2.gain.linearRampToValueAtTime(0,n+.28);o2.connect(g2);g2.connect(c.destination);o2.start(n+.04);o2.stop(n+.3);}catch(e){}}

// ─── SYRINGE SVG ─────────────────────────────────
function buildSyringeSVG(color,injecting){
  var liqW=injecting?'10':'82';
  var plungerX=injecting?'18':'0';
  return '<svg viewBox="0 0 230 54" width="230" height="54" style="display:block;overflow:visible">'
    +'<!-- body -->'
    +'<rect x="30" y="19" width="134" height="16" rx="3" fill="#0c1824" stroke="'+color+'" stroke-width="1.2" opacity=".9"/>'
    +'<!-- graduation marks -->'
    +'<line x1="55" y1="22" x2="55" y2="32" stroke="'+color+'" stroke-width=".7" opacity=".3"/>'
    +'<line x1="75" y1="22" x2="75" y2="32" stroke="'+color+'" stroke-width=".7" opacity=".3"/>'
    +'<line x1="95" y1="22" x2="95" y2="32" stroke="'+color+'" stroke-width=".7" opacity=".3"/>'
    +'<line x1="115" y1="22" x2="115" y2="32" stroke="'+color+'" stroke-width=".7" opacity=".3"/>'
    +'<line x1="135" y1="22" x2="135" y2="32" stroke="'+color+'" stroke-width=".7" opacity=".3"/>'
    +'<!-- liquid -->'
    +'<rect x="32" y="21" width="'+liqW+'" height="12" rx="2" fill="'+color+'" opacity=".28" style="transition:width .4s ease-in"/>'
    +'<!-- needle hub -->'
    +'<rect x="164" y="21" width="18" height="12" rx="1.5" fill="#112030" stroke="'+color+'" stroke-width=".8" opacity=".9"/>'
    +'<!-- needle -->'
    +'<rect x="182" y="24" width="32" height="6" rx="1" fill="#778899"/>'
    +'<polygon points="214,24 220,27 214,30" fill="#99aabb"/>'
    +'<!-- plunger -->'
    +'<g style="transform:translateX('+plungerX+'px);transition:transform .4s ease-in">'
    +'<rect x="18" y="15" width="14" height="24" rx="2" fill="#081420" stroke="'+color+'" stroke-width=".8" opacity=".75"/>'
    +'<rect x="5" y="13" width="20" height="5" rx="2" fill="'+color+'" opacity=".7"/>'
    +'<rect x="5" y="36" width="20" height="5" rx="2" fill="'+color+'" opacity=".7"/>'
    +'<rect x="0" y="23" width="6" height="8" rx="1" fill="'+color+'" opacity=".55"/>'
    +'</g>'
    +'<!-- needle glow -->'
    +'<circle cx="220" cy="27" r="3" fill="'+color+'" opacity=".5">'
    +'<animate attributeName="opacity" values=".2;.7;.2" dur="1.1s" repeatCount="indefinite"/>'
    +'</circle>'
    +'</svg>';
}

// ─── BUILD OPTION PANELS ─────────────────────────
const veinRow=document.getElementById('veinRow');
OPTIONS.forEach(function(opt,i){
  var cell=document.createElement('div');
  cell.className='vein-cell';
  cell.style.setProperty('--cell-color',opt.color);
  cell.style.setProperty('--cell-glow',opt.glow);
  cell.innerHTML=
    '<div class="vein-header">'
      +'<span class="vein-key">'+opt.key+'</span>'
      +'<span class="vein-title">'+opt.title+'</span>'
    +'</div>'
    +'<div class="vein-quote">'+opt.quote+'</div>'
    +'<div class="vein-divider"></div>'
    +'<div class="vein-footer">'
      +'<div class="vein-case">'+opt.caseNum+'<br>'+opt.caseTag+'</div>'
      +'<div class="vein-bar-wrap"><div class="vein-bar-fill" id="veinFill'+i+'"></div></div>'
    +'</div>';
  cell.addEventListener('click',function(){selectOption(i);});
  veinRow.appendChild(cell);
});

// ─── INITIAL SYRINGE ─────────────────────────────
var syringeWrap=document.getElementById('syringeSvgWrap');
syringeWrap.innerHTML=buildSyringeSVG(OPTIONS[0].color,false);

// ─── STATE ───────────────────────────────────────
var selectedIdx=null,locked=false,lightsOutUsed=false;

// ─── SELECT OPTION ────────────────────────────────
function selectOption(i){
  if(locked)return;
  if(selectedIdx===i)return;
  selectedIdx=i;
  var opt=OPTIONS[i];
  // Rebuild syringe with selected color
  syringeWrap.innerHTML=buildSyringeSVG(opt.color,false);
  // Tilt toward selected option: A=left, B=right
  var tiltDeg=i===0?-14:14;
  var shiftPx=i===0?-28:28;
  syringeWrap.style.transform='translateX('+shiftPx+'px) rotate('+tiltDeg+'deg)';
  // Update option panels
  veinRow.querySelectorAll('.vein-cell').forEach(function(cell,j){
    cell.classList.toggle('selected',j===i);
  });
  // Pulse vein fill to ~30% to show aim
  var fill=document.getElementById('veinFill'+i);
  var otherFill=document.getElementById('veinFill'+(i===0?1:0));
  if(fill){fill.style.width='30%';}
  if(otherFill){otherFill.style.width='0%';}
  // NPC comment
  setNpcComment(NPC_COMMENTS[opt.key]);
  updateConfirm();
  playClick();
}

function setNpcComment(html){
  var el=document.getElementById('npcComment');
  el.classList.add('fade');
  setTimeout(function(){el.innerHTML=html;el.classList.remove('fade');},220);
}

function updateConfirm(){
  var cz=document.getElementById('confirmZone');
  var ct=document.getElementById('confirmText');
  var ch=document.getElementById('confirmHint');
  cz.classList.toggle('visible',selectedIdx!==null);
  if(selectedIdx!==null){
    var opt=OPTIONS[selectedIdx];
    ct.innerHTML='已选择 <span style="color:'+opt.color+'">'+opt.label+'</span>';
    ch.textContent='▷ 注射确认进入下一题';
  }
}

// ─── INJECT ANIMATION ────────────────────────────
function doInjectAnimation(cb){
  if(selectedIdx===null){cb();return;}
  var opt=OPTIONS[selectedIdx];
  playInject();
  // Syringe: rebuild in "injecting" state (plunger pushed, liquid drained)
  syringeWrap.innerHTML=buildSyringeSVG(opt.color,true);
  // Vein fill to 100%
  var fill=document.getElementById('veinFill'+selectedIdx);
  if(fill){
    fill.style.transition='width .55s cubic-bezier(.4,0,.2,1)';
    requestAnimationFrame(function(){fill.style.width='100%';});
  }
  // Screen color flash
  var flash=document.createElement('div');
  flash.style.cssText='position:fixed;inset:0;z-index:8000;pointer-events:none;background:'+opt.color+';opacity:.15;transition:opacity .5s ease';
  document.body.appendChild(flash);
  requestAnimationFrame(function(){
    setTimeout(function(){flash.style.opacity='0';setTimeout(function(){flash.remove();},500);},60);
  });
  setTimeout(cb,720);
}

// ─── EGG 1 LIGHTS OUT ────────────────────────────
function doLightsOut(cb){
  var el=document.getElementById('lights-out');
  var dim=document.getElementById('lights-out-dim');
  var content=document.getElementById('lights-out-content');
  var bgm=document.getElementById('q1-bgm');
  if(bgm){bgm.volume=0;}
  content.style.cssText='';dim.style.cssText='';dim.style.opacity='0';dim.style.transition='opacity .6s ease';
  el.classList.add('on');
  setTimeout(function(){dim.style.opacity='1';},1200);
  setTimeout(function(){
    content.style.opacity='0';content.style.transition='opacity .15s ease';
    dim.style.opacity='0';dim.style.transition='opacity 1.2s ease';
    setTimeout(function(){
      el.classList.remove('on');content.style.cssText='';dim.style.cssText='';
      startBGM();setTimeout(cb,200);
    },1300);
  },1200+600+3000);
}

// ─── CONFIRM FLOW ─────────────────────────────────
document.getElementById('confirmBtn').addEventListener('click',function(){
  if(selectedIdx===null||locked)return;
  playClick();
  startBGM();
  locked=true;
  document.getElementById('confirmZone').classList.remove('visible');
  var isB=(OPTIONS[selectedIdx].key==='B');

  var afterInject=function(){
    startBGM();
    var ts=document.getElementById('transition-screen');
    ts.classList.add('open');
    playChime();
    setTimeout(function(){
      ts.classList.remove('open');
      save();
      setTimeout(function(){window.location.href='../Q2/survey_q2_backup_20260311.html';},300);
    },2500);
  };

  doInjectAnimation(function(){
    if(isB&&!lightsOutUsed){lightsOutUsed=true;doLightsOut(afterInject);}
    else afterInject();
  });
});

function save(){try{localStorage.setItem('survey_q1',OPTIONS[selectedIdx].key);}catch(e){}}

function startBGM(){var b=document.getElementById('q1-bgm');if(b){b.volume=0.3;b.play().catch(function(){});}}
startBGM();
document.addEventListener('click',function onFirst(){startBGM();document.removeEventListener('click',onFirst);document.removeEventListener('touchstart',onFirst);},{once:true,passive:true});
document.addEventListener('touchstart',function onFirst(){startBGM();document.removeEventListener('click',onFirst);document.removeEventListener('touchstart',onFirst);},{once:true,passive:true});
document.getElementById('introBtn').addEventListener('click',function(){
  startBGM();
  document.getElementById('introOverlay').classList.add('hidden');
  document.getElementById('q1Main').classList.add('visible');
  updateConfirm();
});

})();
</script>
</body>
</html>
